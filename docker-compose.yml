services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartschool-app
    ports:
      - "8080:80"
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    networks:
      - smartschool-network
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: smartschool-redis
    restart: unless-stopped
    networks:
      - smartschool-network
    ports:
      - "6379:6379"

networks:
  smartschool-network:
    driver: bridge