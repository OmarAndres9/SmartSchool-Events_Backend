<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer contraseña — Sistema RRHH</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
}

/* CARD PRINCIPAL */
.container{
  display:flex;
  width:800px;
  max-width:95%;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* PANEL IZQUIERDO */
.left{
  width:40%;
  background:linear-gradient(160deg,#c7e5c5,#9dd39a);
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.left h2{
  font-size:22px;
  margin-bottom:15px;
  color:#1a1a1a;
}

.left p{
  font-size:14px;
  color:#2f2f2f;
  line-height:1.5;
}

/* PANEL DERECHO */
.right{
  width:60%;
  background:#fff;
  padding:40px;
}

.logo{
  font-weight:bold;
  color:#2e7d32;
  margin-bottom:25px;
}

.right h1{
  font-size:22px;
  margin-bottom:10px;
}

.right p{
  font-size:14px;
  color:#666;
  margin-bottom:20px;
}

label{
  font-size:13px;
  font-weight:bold;
  display:block;
  margin-bottom:6px;
}

input{
  width:100%;
  padding:11px 12px;
  border:1px solid #ddd;
  border-radius:6px;
  margin-bottom:15px;
  font-size:14px;
}

input:focus{
  border-color:#2e7d32;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#2e7d32;
  color:#fff;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  background:#9ccc9c;
  cursor:not-allowed;
}

.alert{
  padding:12px;
  border-radius:6px;
  font-size:14px;
  margin-bottom:15px;
  display:none;
}

.alert.success{
  background:#d1fae5;
  color:#065f46;
  display:block;
}

.alert.error{
  background:#fee2e2;
  color:#991b1b;
  display:block;
}

@media(max-width:700px){
  .container{
    flex-direction:column;
  }

  .left{
    width:100%;
    text-align:center;
  }

  .right{
    width:100%;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="left">
    <h2>Recuperar acceso</h2>
    <p>
      Estás a un paso de recuperar tu cuenta del sistema de recursos humanos.
      Ingresa tu nueva contraseña para volver a acceder al sistema.
    </p>
  </div>

  <div class="right">

    <div class="logo">🟢 Sistema RRHH</div>

    <h1>Nueva contraseña</h1>
    <p>Escribe tu nueva contraseña para restablecer el acceso.</p>

    <div id="alert" class="alert"></div>

    <div id="resetForm">

      <label>Nueva contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 8 caracteres">

      <label>Confirmar contraseña</label>
      <input type="password" id="confirm" placeholder="Repite la contraseña">

      <button id="btn" onclick="submitReset()">Restablecer contraseña</button>

    </div>

  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const token  = params.get('token');
const email  = params.get('email');

function showAlert(msg,type){
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert ' + type;
}

if(!token || !email){
  showAlert('Enlace inválido. Solicita un nuevo correo de recuperación.','error');
  document.getElementById('resetForm').style.display='none';
}

async function submitReset(){

  const password=document.getElementById('password').value;
  const confirm=document.getElementById('confirm').value;
  const btn=document.getElementById('btn');

  if(password.length<8) return showAlert('Mínimo 8 caracteres.','error');
  if(password!==confirm) return showAlert('Las contraseñas no coinciden.','error');

  btn.disabled=true;
  btn.textContent='Procesando...';

  try{

    const response = await fetch('https://literate-zebra-x5vpxjw654pq267jv-8080.app.github.dev/api/v1/reset-password',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Accept':'application/json'
      },
      body:JSON.stringify({
        email_usuario:email,
        token:token,
        contrasena_usuario:password,
        contrasena_usuario_confirmation:confirm
      })
    });

    const data = await response.json();

    if(data.success){
      showAlert('✅ Contraseña actualizada. Ya puedes iniciar sesión.','success');
      document.getElementById('resetForm').style.display='none';
    }else{
      showAlert(data.message || 'Token inválido o expirado.','error');
      btn.disabled=false;
      btn.textContent='Restablecer contraseña';
    }

  }catch(err){
    showAlert('Error de conexión. Verifica que el servidor esté activo.','error');
    btn.disabled=false;
    btn.textContent='Restablecer contraseña';
  }

}

</script>

</body>
</html>
